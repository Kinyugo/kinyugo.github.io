<!DOCTYPE html>
<html lang="en" class="scroll-smooth">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }} | {{ site.title }}</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Montserrat:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400&family=Noto+Serif:ital,wght@0,400;0,700;1,400;1,700&display=swap"
        rel="stylesheet">
    <!-- Google Fonts -->

    <!-- Boostrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.3/font/bootstrap-icons.css">
    <!-- Boostrap Icons -->

    <!-- CSS -->
    <link rel="stylesheet" href="/dist/css/main.css">
    <!-- CSS -->

    <!-- JS -->
    <script defer src="/assets/js/main.js"></script>
    <!-- JS -->

    <!-- Plugins -->
    {% feed_meta %}
    {% seo %}
    <!-- Plugins -->
</head>

<body class="bg-gray-100 dark:bg-smoky-black dark:text-gray-200 transition-colors">
    <main class="min-h-screen">
        {% include navbar.html %}
        {{ content }}
    </main>

    {% include footer.html %}
</body>

</html>
